# Nginx reverse proxy for Henley Hub.
# Symlink into sites-enabled, `nginx -t`, reload, then `certbot --nginx` to add
# the 443 server block + redirect automatically. See deploy/README.md.

server {
    listen 80;
    listen [::]:80;
    server_name hub.henleycontracting.com;

    # Daily-log photos + Files uploads — allow larger request bodies than the
    # Nginx 1M default.
    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket / HMR upgrade support.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Preserve host + real client IP for the app behind the proxy.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
